<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Atendimento</title>
</head>
<body>

  <h1>Formulário de Atendimento</h1>

  <form>

    <label>Nome completo:</label><br>
    <input type="text" name="nome"><br><br>

    <label>E-mail:</label><br>
    <input type="email" name="email"><br><br>

    <label>Telefone:</label><br>
    <input type="tel" name="telefone"><br><br>

    <label>Tipo de atendimento:</label><br>
    <select name="tipo">
      <option value="">Selecione...</option>
      <option value="duvida">Dúvida</option>
      <option value="reclamacao">Reclamação</option>
      <option value="sugestao">Sugestão</option>
    </select><br><br>

    <label>Prioridade:</label><br>
    <input type="radio" name="prioridade" value="baixa"> Baixa
    <input type="radio" name="prioridade" value="media"> Média
    <input type="radio" name="prioridade" value="alta"> Alta<br><br>

    <label>Descrição detalhada:</label><br>
    <textarea name="descricao" rows="5" cols="40"></textarea><br><br>

    <label>Anexo:</label><br>
    <input type="file" name="anexo"><br><br>

    <input type="checkbox" name="autorizo"> Autorizo o contato<br><br>

    <button type="submit">Enviar</button>
    <button type="reset">Limpar</button>

  </form>

</body>
</html>
