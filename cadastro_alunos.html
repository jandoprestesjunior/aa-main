<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>
</head>
<body>
    <header>
        <h1>Cadastro de Alunos</h1>
    </header>
<main>
    <section>
        <h2>Cadastro do Aluno</h2>
        <form action="processar_cadastro" method="post">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" size="50" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" size="50"><br><br>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" size="50"><br><br>
            <input type="password" id="confirmar_senha" name="confirmar_senha" size="50" placeholder="Confirmar Senha"><br><br>

            <label for="data_de_nascimento">Data de Nascimento:</label>
            <input type="date" id="data_de_nascimento" name="data_de_nascimento" size="50" required><br><br>

            <label for="genero">Gênero:</label>
            <input type="radio" id="masculino" name="genero" value="masculino" required>Masculino
            <input type="radio" id="feminino" name="genero" value="feminino" required>Feminino
            <input type="radio" id="outro" name="genero" value="outro" required>Outro<br><br>

            <label for="termos_de_uso">Termos de Uso:</label>
            <input type="checkbox" id="termos_de_uso" name="termos_de_uso" required>
            <label for="termos_de_uso">Aceito os termos de uso</label><br><br>

            <input type="submit" value="Cadastrar"><br><br>
            <input type="reset" value="Limpar">
    </section>
</main>
</body>
</html>
